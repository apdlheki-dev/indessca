<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة عبدالله علي - تصميم الأبحاث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .cover-page { 
            width: 210mm; height: 297mm; background: white; margin: auto; 
            background-image: url('https://i.imgur.com/your-background-image.jpg'); /* يمكنك وضع رابط الخلفية في 1000067777_2.jpg هنا */
            background-size: cover; position: relative; color: #1e293b; padding: 50px;
        }
        @media print { .no-print { display: none; } .cover-page { margin: 0; box-shadow: none; } }
    </style>
</head>
<body class="p-4">

    <!-- لوحة التحكم (الخطوة 2) -->
    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-xl mb-10 no-print">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-900">إعداد بيانات البحث</h2>
        <div class="space-y-4">
            <input type="text" id="inName" placeholder="الاسم" class="w-full p-3 border rounded-xl">
            <input type="text" id="inSupervisor" placeholder="المشرف عن البحث" class="w-full p-3 border rounded-xl">
            <input type="text" id="inTitle" placeholder="عنوان البحث" class="w-full p-3 border rounded-xl">
            <input type="date" id="inDate" class="w-full p-3 border rounded-xl">
            <button onclick="updateCover()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">تحديث الغلاف</button>
        </div>
    </div>

    <!-- الغلاف (كما في 1000067777_2.jpg) -->
    <div id="coverPreview" class="cover-page shadow-2xl flex flex-col items-center justify-between text-center">
        <h1 id="outTitle" class="text-4xl font-bold mt-20">عنوان البحث</h1>
        <div class="space-y-4">
            <p class="text-xl">إعداد: <span id="outName"></span></p>
            <p class="text-xl">إشراف: <span id="outSupervisor"></span></p>
            <p class="text-lg text-gray-500" id="outDate"></p>
        </div>
        <div class="mb-10 text-sm">تم التطوير بواسطة عبدالله علي | @ap__ud</div>
    </div>

    <div class="fixed bottom-5 left-0 right-0 flex justify-center gap-4 no-print">
        <button onclick="window.print()" class="bg-purple-600 text-white px-8 py-3 rounded-full font-bold shadow-lg">طباعة 🖨️</button>
    </div>

    <script>
        function updateCover() {
            document.getElementById('outName').innerText = document.getElementById('inName').value;
            document.getElementById('outSupervisor').innerText = document.getElementById('inSupervisor').value;
            document.getElementById('outTitle').innerText = document.getElementById('inTitle').value;
            document.getElementById('outDate').innerText = document.getElementById('inDate').value;
        }
    </script>
</body>
</html>
